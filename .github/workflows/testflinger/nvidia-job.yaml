# This is a template
# Some variables should be replaced with envsubst before use
job_queue: $JOB_QUEUE
global_timeout: 3600
output_timeout: 1800
provision_data:
  distro: $DISTRO
test_data:

  # Copy files from the GH runner to the Testflinger Agent
  attachments:
    - local: "scripts"
      agent: "scripts"

  # Run commands on the Testflinger Agent
  test_cmds: |
    #!/usr/bin/env bash
    set -e
    
    export SNAP_CHANNEL=$SNAP_CHANNEL
    export SCRIPTS=./attachments/test/scripts
    
    $SCRIPTS/agent.sh
