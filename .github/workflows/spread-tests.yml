name: Spread Tests

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      snap_channel:
        description: 'Snap Store channel containing the version of docker to test'
        required: true
        type: string
  push:
    branches: [ IENG-2307-run-spread-tests-on-pr ]

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

jobs:
  spread-tests:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - os: ubuntu-latest
            spread_target_arch: amd64
          - os: ubuntu-24.04-arm
            spread_target_arch: arm64
    runs-on: ${{ matrix.runner.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prep
        run: |
          sudo snap install image-garden

      - name: Spread tests
        run: |
          export SNAP_CHANNEL="${{ inputs.snap_channel }}"
          if [ -z "$SNAP_CHANNEL" ]; then
            echo "Defaulting to 'edge' channel since no SNAP_CHANNEL input was provided"
            export SNAP_CHANNEL="edge"
          fi
          test_filter="ubuntu...${{ matrix.runner.spread_target_arch }}"
          image-garden.spread -v -vv "$test_filter"
