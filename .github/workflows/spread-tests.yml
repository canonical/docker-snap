name: Spread Tests

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      snap_channel:
        description: 'Snap Store channel containing the version of docker to test'
        required: true
        type: string

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

jobs:
  spread-tests:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - os: ubuntu-latest
            spread_target_arch: amd64
          - os: ubuntu-24.04-arm
            spread_target_arch: arm64
    runs-on: ${{ matrix.runner.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run spread tests
        uses: zyga/image-garden-action@3a6aa9042a0b994707108d1b205c4ac1845cebe5 # v0.3
        with:
          garden-system: "ubuntu...${{ matrix.runner.spread_target_arch }}"
        env:
          SNAP_CHANNEL: ${{ github.event.inputs.snap_channel }}
