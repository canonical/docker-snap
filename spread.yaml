project: docker
kill-timeout: 3h
backends:
  # LXD is currently not supported as a backend, because we need to set lxc instance
  # config to make docker work in an lxc container,
  # see https://ubuntu.com/tutorials/how-to-run-docker-inside-lxd-containers#2-create-lxd-container

  #lxd:
  #  systems:
  #    - ubuntu-24.04

  garden:
    type: adhoc

    allocate: |
      # Spread automatically injects /snap/bin to PATH. When we are
      # running from the image-garden snap then SPREAD_HOST_PATH is the
      # original path before such modifications were applied. Snap
      # applications cannot normally run /snap/bin/* entry-points
      # successfully so re-set PATH to the original value, as provided by
      # snapcraft.
      if [ -n "${SPREAD_HOST_PATH-}" ]; then
        PATH="${SPREAD_HOST_PATH}"
      fi

      export QEMU_SMP_OPTION="-smp 4"
      export QEMU_MEM_OPTION="-m 3072"

      # Map spread system architecture
      SPREAD_SYSTEM=${SPREAD_SYSTEM/%amd64/x86_64}  # maps "amd64" to "x86_64"
      SPREAD_SYSTEM=${SPREAD_SYSTEM/%arm64/aarch64} # maps "arm64" to "aarch64"

      HOST_ARCH="${ARCH:-$(uname -m)}"
      SYSTEM_ARCH="${SPREAD_SYSTEM##*.}"

      image_garden_output="$(image-garden allocate "${SPREAD_SYSTEM/-plus-/+}")" || true

      if [ -z "$image_garden_output" ]; then
        echo "Image garden allocation failed for system: $SPREAD_SYSTEM"

        # Guard against corrupt EFI vars image.
        efi_vars_img=".image-garden/${SPREAD_SYSTEM}.efi-vars.img"

        if [ -f "$efi_vars_img" ]; then
          recreate_efi_vars_img="false"
          if [ ! -s "$efi_vars_img" ]; then
            echo "Found zero-byte EFI vars image: $efi_vars_img"
            recreate_efi_vars_img="true"
          else
            required_efi_vars_img_size=""
            case "$SYSTEM_ARCH" in
              x86_64)
                required_efi_vars_img_size="540672"
                ;;
              aarch64)
                required_efi_vars_img_size="67108864"
                ;;
            esac

            if [ -n "$required_efi_vars_img_size" ]; then
              efi_vars_img_size="$(stat -c %s "$efi_vars_img")"
              if [ "$efi_vars_img_size" != "$required_efi_vars_img_size" ]; then
                echo "Found unexpected EFI vars image size ($efi_vars_img_size), expected $required_efi_vars_img_size: $efi_vars_img"
                recreate_efi_vars_img="true"
              fi
            fi
          fi

          if [ "$recreate_efi_vars_img" = "true" ]; then
            rm -f "$efi_vars_img"
            image-garden make "${SPREAD_SYSTEM/-plus-/+}.efi-vars.img"
          fi
        fi

        ERROR "Image garden allocation failed"
      fi

      if [ "$HOST_ARCH" != "$SYSTEM_ARCH" ] || [ ! -e /dev/kvm ]; then
        # Spread has a fixed, 5-minute timeout for ssh to become ready.
        # When emulating across architectures this may not be sufficient
        # for the system to become ready. Sleep for a while to give things
        # a chance to finish.
        sleep 5m
      fi

      ADDRESS "$image_garden_output"
    discard: |
      # Spread automatically injects /snap/bin to PATH. When we are
      # running from the image-garden snap then SPREAD_HOST_PATH is the
      # original path before such modifications were applied. Snap
      # applications cannot normally run /snap/bin/* entry-points
      # successfully so re-set PATH to the original value, as provided by
      # snapcraft.
      if [ -n "${SPREAD_HOST_PATH-}" ]; then
        PATH="${SPREAD_HOST_PATH}"
      fi

      image-garden discard "$SPREAD_SYSTEM_ADDRESS"
    systems:
      # Want to add more systems? Look here for a list of available systems: https://gitlab.com/zygoon/image-garden/-/tree/main/data
      # or look here for an exhaustive example: https://gitlab.com/zygoon/image-garden/-/blob/main/spread-demo/spread.yaml
      # Note: ubuntu core images are prepared via this script: https://gitlab.com/zygoon/image-garden/-/blob/main/mk/050-ubuntu-core.mk
      - ubuntu-core-22.amd64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_AMD64)
      - ubuntu-core-22.arm64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_ARM64)
      - ubuntu-cloud-22.04.amd64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_AMD64)
      - ubuntu-cloud-22.04.arm64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_ARM64)

      - ubuntu-core-24.amd64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_AMD64)
      - ubuntu-core-24.arm64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_ARM64)
      - ubuntu-cloud-24.04.amd64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_AMD64)
      - ubuntu-cloud-24.04.arm64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_ARM64)

      - ubuntu-cloud-26.04.amd64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_AMD64)
      - ubuntu-cloud-26.04.arm64:
          username: ubuntu
          password: ubuntu
          environment:
            SNAP_FILE: $(HOST:echo $SNAP_FILE_ARM64)

path: /tmp/docker
exclude:
  - .git
  - "*.qcow2"
  - "*.iso"
  - "*.img"
  - "*.log"
  - "*.run"
  - "*.pid"
  - ".image-garden/*"

suites:
  spread/main/:
    summary: Full-system tests for the docker snap

environment:
  SCRIPTS_PATH: $SPREAD_PATH/spread/scripts
  SNAP_CHANNEL: $(HOST:echo $SNAP_CHANNEL) # The Snap Store channel containing the version of docker to test

prepare: |
  # Invoked in each system before running any test
  # Learn more about preparing and restoring: https://github.com/canonical/spread?tab=readme-ov-file#preparing

  . "$SCRIPTS_PATH/prepare.sh"
